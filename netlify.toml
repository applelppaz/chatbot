[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Allow large image payloads (Netlify default is 6MB; we cap at 4MB client-side).
  included_files = []

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — every other path serves index.html so React Router works on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never let browsers cache index.html itself. Its <script src> references
# hashed asset filenames that change on every deploy, so a stale index.html
# means the device keeps loading the old JS/CSS forever — especially painful
# for iOS home-screen PWAs, which otherwise can stay pinned to an old build
# for weeks.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hashed assets (Vite emits content-hashed filenames) can be cached forever —
# a new deploy publishes new filenames, so there is no staleness risk.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  framework = "#custom"
